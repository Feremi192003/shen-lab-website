name: Sync publications

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/sync-publications.mjs"
      - ".github/workflows/sync-publications.yml"
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch complete Zotero library
        run: node scripts/sync-publications.mjs

      - name: Commit publication updates
        run: |
          if git diff --quiet -- data/publications.json; then
            echo "Publication data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          git commit -m "chore: sync publications from Zotero"
          git push
